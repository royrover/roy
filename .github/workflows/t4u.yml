name: True4U & Amarin & d66_mid Scraper

on:
  schedule:
    - cron: '0 */4 * * *' # รันทุก 6 ชั่วโมง
  workflow_dispatch: # กดรันเองได้

permissions:
  contents: write # อนุญาตให้บอทเขียนไฟล์ลง Repo ได้

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install cloudscraper
          pip install bs4

      - name: Run Scrapers
        run: |
          python t4u.py
          python amarin.py
          python d66_mid.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # เพิ่มไฟล์ทั้งหมดที่เกี่ยวข้อง
          git add data.json amarin.json matches_pool.json
          # Commit เฉพาะเมื่อมีการเปลี่ยนแปลงไฟล์จริงๆ
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Scraper Data [skip ci]"
            git push
          fi
