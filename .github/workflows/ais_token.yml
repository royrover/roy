name: Update AIS Token & Get Nation & Get ThaiRath
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ขยับมาใช้ Node LTS เวอร์ชั่นปัจจุบันเพื่อความเสถียร
          cache: 'npm'

      # 🎯 ขั้นตอนสำคัญ: ติดตั้ง Chrome Dependencies สำหรับ Ubuntu และสั่งลง Puppeteer แบบสมบูรณ์
      - name: Install Google Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/apt/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable libxss1 --no-install-recommends

      - name: Install Node Modules
        run: npm ci # ใช้ npm ci แทน install เพื่อความนิ่งบน Server Production

      - name: Get AIS Token & Get Nation & Get Thairath
        timeout-minutes: 5
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable # บังคับให้ใช้ Chrome ตัวเต็มของระบบ
        run: |
          node get_token.js
          node get_media_url.js
          node get_thairth.js

      - name: Commit token
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ใส่เผื่อไว้ในกรณีที่บางไฟล์ยังไม่ถูกสร้าง จะได้ไม่พังที่บรรทัด git add
          touch roy_token.json nation_token.json thairath_token.json 
          git add roy_token.json nation_token.json thairath_token.json
          git diff --staged --quiet || git commit -m "🤖 Auto-Update Tokens [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
