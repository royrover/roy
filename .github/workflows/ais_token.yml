name: Update AIS Token & Get Nation & Get ThaiRath
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ลบหรือคอมเมนต์บรรทัด cache: 'npm' ออกไป

      - name: Install Google Chrome & Dependencies
        run: |
          sudo apt-get update
          # ... (โค้ดส่วนอื่นเหมือนเดิมทุกประการ) ...

      - name: Install Node Modules
        run: npm install  # เปลี่ยนจาก npm ci กลับเป็น npm install

      - name: Get AIS Token & Get Nation & Get Thairath
        timeout-minutes: 5
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable # บังคับให้ใช้ Chrome ตัวเต็มของระบบ
        run: |
          node get_token.js
          node get_media_url.js
          node get_thairath.js

      - name: Commit token
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ใส่เผื่อไว้ในกรณีที่บางไฟล์ยังไม่ถูกสร้าง จะได้ไม่พังที่บรรทัด git add
          touch roy_token.json nation_token.json thairath_token.json 
          git add roy_token.json nation_token.json thairath_token.json
          git diff --staged --quiet || git commit -m "🤖 Auto-Update Tokens [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
